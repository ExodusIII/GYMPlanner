# Full stack: PostgreSQL + .NET API + React (nginx).
#   docker compose up --build
#   web → http://localhost:5173   api → http://localhost:5030 (/scalar/v1)
# Optional AI: set ANTHROPIC_API_KEY in your shell before `up` to enable /api/programs.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gymplanner
    ports:
      - "5433:5432" # host access for tooling / local `dotnet run`
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gymplanner"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: src/GYMPlanner.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db;Port=5432;Database=gymplanner;Username=postgres;Password=postgres"
      # AI program generator: "Claude" (paid API) or "Ollama" (free, local).
      ProgramGenerator__Provider: ${PROGRAM_GENERATOR:-Claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Defaults to Ollama running on the host. For the in-compose ollama
      # service (--profile ollama) set OLLAMA_BASEURL=http://ollama:11434.
      Ollama__BaseUrl: ${OLLAMA_BASEURL:-http://host.docker.internal:11434}
      Ollama__Model: ${OLLAMA_MODEL:-llama3.2}
      # OpenAI-compatible provider (Gemini, Groq, OpenRouter, …).
      # Key: use AI_API_KEY (any provider) or GEMINI_API_KEY (Gemini).
      OpenAi__ApiKey: ${AI_API_KEY:-${GEMINI_API_KEY:-}}
      OpenAi__BaseUrl: ${OPENAI_BASEURL:-https://generativelanguage.googleapis.com/v1beta/openai}
      OpenAi__Model: ${OPENAI_MODEL:-gemini-2.0-flash}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5030:8080"
    depends_on:
      db:
        condition: service_healthy

  # Optional, free local LLM. Not started by default (the image is large).
  # Enable with:  docker compose --profile ollama up -d
  # Tip: running Ollama natively on the host is faster (GPU) — see README.
  ollama:
    image: ollama/ollama
    profiles: ["ollama"]
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:5030
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  ollamadata:
